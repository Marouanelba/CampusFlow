apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: campusflow-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Marouanelba/CampusFlow.git
    targetRevision: HEAD
    path: helm/campusflow
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
